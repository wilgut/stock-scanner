<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scanner de Acciones</title>
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --border: #30363d;
    --text: #e6edf3; --muted: #8b949e; --accent: #2f81f7;
    --green: #3fb950; --red: #f85149; --gold: #d29922;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding: 16px; max-width: 1200px; margin: 0 auto;
  }
  header { margin-bottom: 18px; }
  h1 { font-size: 1.5rem; }
  h1 span { color: var(--accent); }
  .subtitle { color: var(--muted); font-size: 0.85rem; margin-top: 4px; }

  .filtros {
    display: flex; gap: 12px; flex-wrap: wrap; align-items: end;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px; margin-bottom: 18px;
  }
  .filtros label { font-size: 0.75rem; color: var(--muted); display: block; margin-bottom: 4px; }
  .filtros input {
    background: var(--bg); border: 1px solid var(--border); color: var(--text);
    border-radius: 6px; padding: 8px 10px; width: 130px; font-size: 0.9rem;
  }

  h2.categoria {
    font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;
    color: var(--gold); margin: 20px 0 10px;
  }
  h2.categoria.inst { color: var(--accent); }

  .scans { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }
  .scan-card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px; display: flex; flex-direction: column; gap: 8px;
  }
  .scan-card h3 { font-size: 0.95rem; }
  .scan-card p { font-size: 0.8rem; color: var(--muted); flex: 1; line-height: 1.45; }
  .scan-card button {
    background: var(--accent); color: #fff; border: none; border-radius: 8px;
    padding: 10px; font-size: 0.9rem; font-weight: 600; cursor: pointer; width: 100%;
  }
  .scan-card button:disabled { opacity: 0.5; cursor: wait; }
  .scan-card .badge {
    font-size: 0.75rem; color: var(--muted); min-height: 1em;
  }
  .badge.ok { color: var(--green); }
  .badge.vacio { color: var(--gold); }
  .badge.error { color: var(--red); }

  #resultados { margin-top: 24px; }
  #resultados h2 { font-size: 1.1rem; margin-bottom: 4px; }
  #resultados .info { color: var(--muted); font-size: 0.8rem; margin-bottom: 10px; }
  .tabla-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 10px; }
  table { border-collapse: collapse; width: 100%; font-size: 0.85rem; }
  th, td { padding: 8px 10px; text-align: right; white-space: nowrap; }
  th { background: var(--panel); color: var(--muted); font-weight: 600; font-size: 0.75rem;
       text-transform: uppercase; position: sticky; top: 0; }
  td:first-child, th:first-child, td:nth-child(2), th:nth-child(2) { text-align: left; }
  tr { border-top: 1px solid var(--border); }
  tr:hover td { background: rgba(47, 129, 247, 0.07); }
  a.ticker { color: var(--accent); font-weight: 700; text-decoration: none; }
  a.ticker:hover { text-decoration: underline; }
  .pos { color: var(--green); } .neg { color: var(--red); }
  .nombre-col { max-width: 220px; overflow: hidden; text-overflow: ellipsis; }

  @media (max-width: 640px) {
    body { padding: 10px; }
    .col-opcional { display: none; }
    .filtros input { width: 110px; }
  }
</style>
</head>
<body>
<header>
  <h1>📈 Scanner de <span>Acciones</span></h1>
  <div class="subtitle">Scans de stock picking con datos del screener de TradingView · NYSE, NASDAQ y AMEX</div>
</header>

<div class="filtros">
  <div>
    <label for="min_price">Precio mínimo ($)</label>
    <input type="number" id="min_price" value="5" min="0" step="1">
  </div>
  <div>
    <label for="min_volume">Volumen mínimo</label>
    <input type="number" id="min_volume" value="500000" min="0" step="100000">
  </div>
</div>

{% for categoria, lista in categorias.items() %}
  <h2 class="categoria {{ 'inst' if categoria != 'Mis Scans' else '' }}">{{ categoria }}</h2>
  <div class="scans">
    {% for scan_id, scan in lista %}
    <div class="scan-card">
      <h3>{{ scan.nombre }}</h3>
      <p>{{ scan.descripcion }}</p>
      <div class="badge" id="badge-{{ scan_id }}"></div>
      <button onclick="ejecutar('{{ scan_id }}')" id="btn-{{ scan_id }}">Ejecutar scan</button>
    </div>
    {% endfor %}
  </div>
{% endfor %}

<div id="resultados"></div>

<script>
function fmtVol(v) {
  if (v == null) return '—';
  if (v >= 1e9) return (v / 1e9).toFixed(2) + ' B';
  if (v >= 1e6) return (v / 1e6).toFixed(1) + ' M';
  if (v >= 1e3) return (v / 1e3).toFixed(0) + ' K';
  return v.toFixed(0);
}
function fmtNum(v, d) { return v == null ? '—' : Number(v).toFixed(d); }

async function ejecutar(scanId) {
  const btn = document.getElementById('btn-' + scanId);
  const badge = document.getElementById('badge-' + scanId);
  btn.disabled = true; btn.textContent = 'Escaneando…';
  badge.className = 'badge'; badge.textContent = '';
  const p = new URLSearchParams({
    min_price: document.getElementById('min_price').value || 0,
    min_volume: document.getElementById('min_volume').value || 0,
  });
  try {
    const r = await fetch(`/api/scan/${scanId}?` + p);
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Error');
    badge.textContent = data.total + ' resultado' + (data.total === 1 ? '' : 's');
    badge.className = 'badge ' + (data.total > 0 ? 'ok' : 'vacio');
    mostrar(data);
  } catch (e) {
    badge.textContent = e.message;
    badge.className = 'badge error';
  } finally {
    btn.disabled = false; btn.textContent = 'Ejecutar scan';
  }
}

function mostrar(data) {
  const cont = document.getElementById('resultados');
  if (!data.resultados.length) {
    cont.innerHTML = `<h2>${data.scan}</h2>
      <div class="info">Sin coincidencias hoy. Los scans de cruce exacto son poco
      frecuentes: prueba de nuevo otro día o relaja los filtros.</div>`;
    cont.scrollIntoView({ behavior: 'smooth' });
    return;
  }
  const filas = data.resultados.map(r => {
    const [exch, sym] = r.ticker.split(':');
    const url = `https://es.tradingview.com/chart/?symbol=${encodeURIComponent(r.ticker)}`;
    const chg = r.change == null ? 0 : r.change;
    return `<tr>
      <td><a class="ticker" href="${url}" target="_blank">${sym}</a></td>
      <td class="nombre-col col-opcional">${r.description || ''}</td>
      <td>$${fmtNum(r.close, 2)}</td>
      <td class="${chg >= 0 ? 'pos' : 'neg'}">${chg >= 0 ? '+' : ''}${fmtNum(r.change, 2)}%</td>
      <td>${fmtVol(r.volume)}</td>
      <td class="col-opcional">${fmtNum(r.relative_volume_10d_calc, 1)}x</td>
      <td>${fmtNum(r.RSI, 0)}</td>
      <td>${fmtNum(r['RSI|1W'], 0)}</td>
      <td class="col-opcional">${fmtVol(r.market_cap_basic)}</td>
      <td class="col-opcional">${r.sector || '—'}</td>
    </tr>`;
  }).join('');
  cont.innerHTML = `<h2>${data.scan}</h2>
    <div class="info">${data.total} coincidencias en total · mostrando ${data.resultados.length}
    · pulsa un ticker para abrir su gráfico en TradingView</div>
    <div class="tabla-wrap"><table>
      <thead><tr>
        <th>Ticker</th><th class="col-opcional">Nombre</th><th>Precio</th><th>Cambio</th>
        <th>Volumen</th><th class="col-opcional">Vol. Rel.</th><th>RSI D</th><th>RSI S</th>
        <th class="col-opcional">Cap.</th><th class="col-opcional">Sector</th>
      </tr></thead>
      <tbody>${filas}</tbody>
    </table></div>`;
  cont.scrollIntoView({ behavior: 'smooth' });
}
</script>
</body>
</html>
